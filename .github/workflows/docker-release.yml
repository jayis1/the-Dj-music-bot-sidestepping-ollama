# ── Radio DJ Bot — Docker Build & GitHub Release ─────────────────────────────
#
# Triggers:
#   - Push a version tag:  git tag v6.4.0 && git push --tags
#   - This builds + pushes Docker images to ghcr.io and creates a GitHub Release
#
# Images published:
#   ghcr.io/jayis1/the-dj-music-bot:<version>      (bot)
#   ghcr.io/jayis1/the-dj-music-bot:latest          (bot)
#   ghcr.io/jayis1/the-dj-music-bot/moss-tts-server:<version>
#   ghcr.io/jayis1/the-dj-music-bot/moss-tts-server:latest
#   ghcr.io/jayis1/the-dj-music-bot/obs-studio:<version>
#   ghcr.io/jayis1/the-dj-music-bot/obs-studio:latest
#
# Note on Ollama: Ollama is NOT a custom image — it uses the official
# ollama/ollama image directly in docker-compose.yml. The model is
# auto-pulled at startup by the ollama-puller sidecar container.
# ─────────────────────────────────────────────────────────────────────────────

name: Docker Build & Release

on:
  push:
    tags:
      - "v*"           # Triggers on v6.3.0, v6.3.1, etc.

permissions:
  contents: write      # For creating GitHub Releases
  packages: write      # For pushing to ghcr.io

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 ahead of June 2026 deadline

jobs:
  build-and-release:
    name: Build, Push & Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Extract version tag (strips the leading 'v')
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 3. Set up Docker Buildx (multi-arch builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Set up QEMU for cross-platform emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 5. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Extract Docker metadata (tags + labels) for the bot image
      - name: Docker metadata — bot
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jayis1/the-dj-music-bot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # 7. Build and push bot image (linux/amd64 + linux/arm64)
      - name: Build & push bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.version.outputs.VERSION }}

      # 8. Extract Docker metadata for MOSS-TTS-Nano
      - name: Docker metadata — MOSS TTS
        id: meta-moss
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jayis1/the-dj-music-bot/moss-tts-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # 9. Build and push MOSS-TTS-Nano image (amd64 only — MOSS doesn't support arm64)
      - name: Build & push MOSS TTS image
        uses: docker/build-push-action@v5
        with:
          context: ./moss-tts-server
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-moss.outputs.tags }}
          labels: ${{ steps.meta-moss.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 10. Extract Docker metadata for OBS Studio
      - name: Docker metadata — OBS Studio
        id: meta-obs
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jayis1/the-dj-music-bot/obs-studio
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # 11. Build and push OBS Studio image (amd64 only — OBS + VNC on arm64 is impractical)
      - name: Build & push OBS Studio image
        uses: docker/build-push-action@v5
        with:
          context: ./obs-studio
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-obs.outputs.tags }}
          labels: ${{ steps.meta-obs.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.version.outputs.VERSION }}

      # 12. Create GitHub Release with docker-compose.yml + .env.example as assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🏴‍☠️ The Radio Pirate DJ Bot ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            docker-compose.yml
            .env.example
          body: |
            ## 🐳 Mega-Easy Install (Docker)

            ```bash
            # 1. Download the starter files (attached below)
            curl -O https://github.com/jayis1/the-Dj-music-bot-sidestepping-ollama/releases/latest/download/docker-compose.yml
            curl -O https://github.com/jayis1/the-Dj-music-bot-sidestepping-ollama/releases/latest/download/.env.example
            mv .env.example .env

            # 2. Insert your Discord token!
            nano .env

            # 3. Start the bot + MOSS TTS + Ollama automatically!
            docker compose up -d

            # 4. Open the Mission Control Dashboard
            open http://localhost:8080
            ```

            ## 🤖 AI Side Host (Ollama)

            The docker-compose.yml now includes an Ollama container for the AI side host.
            To enable it, set these in your `.env`:

            ```bash
            OLLAMA_DJ_ENABLED=true
            OLLAMA_MODEL=gemma3:4b
            ```

            The model is pulled automatically on first start (~2.5 GB download).
            See `.env.example` for more AI side host options.

            ## 📦 Docker Images

            ```
            ghcr.io/jayis1/the-dj-music-bot:${{ steps.version.outputs.VERSION }}
            ghcr.io/jayis1/the-dj-music-bot:latest
            ghcr.io/jayis1/the-dj-music-bot/moss-tts-server:${{ steps.version.outputs.VERSION }}
            ghcr.io/jayis1/the-dj-music-bot/moss-tts-server:latest
            ghcr.io/jayis1/the-dj-music-bot/obs-studio:${{ steps.version.outputs.VERSION }}
            ghcr.io/jayis1/the-dj-music-bot/obs-studio:latest
            ```

            Ollama uses the official image: `ollama/ollama:latest` (no custom build needed).

            ## 🎬 OBS Studio

            The docker-compose.yml includes a headless OBS Studio container for
            streaming to YouTube Live with scene control, browser source overlay,
            and recording. Control it from Mission Control → OBS Studio.

            To enable auto scene switching (visuals match the audio):
            ```bash
            OBS_AUTO_SCENES=true
            OBS_WS_PASSWORD=your_obs_password
            ```

            See [README](https://github.com/jayis1/the-Dj-music-bot-sidestepping-ollama#readme) for full documentation.