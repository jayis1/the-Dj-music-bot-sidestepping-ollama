# ── Radio DJ Music Bot — Docker Compose ──────────────────────────────────────
# Starts the bot + MOSS-TTS-Nano server together.
#
# Quick start:
#   1. cp .env.example .env && nano .env   (set DISCORD_TOKEN at minimum)
#   2. docker compose up -d
#   3. Open http://your-server:8080 for Mission Control
#
# The MOSS-TTS-Nano server runs on CPU by default (0.1B params, no GPU needed).
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MOSS-TTS-Nano server ──────────────────────────────────────────────
  moss-tts:
    image: ghcr.io/jayis1/the-dj-music-bot/moss-tts-server:latest
    # Uncomment to build locally instead:
    # build:
    #   context: ./moss-tts-server
    #   dockerfile: Dockerfile
    container_name: moss-tts
    restart: unless-stopped
    ports:
      - "18083:18083"
    volumes:
      - ./assets/moss_voices:/app/assets/moss_voices
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18083/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Radio DJ Bot ───────────────────────────────────────────────────────────
  bot:
    image: ghcr.io/jayis1/the-dj-music-bot:latest
    # Uncomment to build locally instead:
    # build: .
    container_name: radio-dj-bot
    restart: unless-stopped
    depends_on:
      moss-tts:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Point the bot at the MOSS container (override .env if set differently)
      - MOSS_TTS_URL=http://moss-tts:18083
      - TTS_MODE=moss
    ports:
      - "8080:8080"       # Mission Control web dashboard
    volumes:
      - ./sounds:/app/sounds           # Soundboard files (persisted)
      - ./presets:/app/presets         # Auto-DJ presets (persisted)
      - ./assets/moss_voices:/app/assets/moss_voices  # MOSS voice prompt files
      - ./yt_dlp_cache:/app/yt_dlp_cache
      - ./bot_activity.log:/app/bot_activity.log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s