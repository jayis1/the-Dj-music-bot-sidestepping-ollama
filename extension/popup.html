<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MBot Cookie Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; min-height: 200px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #e0e0e0;
    }
    .header {
      background: linear-gradient(135deg, #ff0000, #cc0000);
      padding: 12px 16px; display: flex; align-items: center; gap: 8px;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: white; }
    .header .logo { font-size: 20px; }
    .content { padding: 16px; }
    .status-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
      padding: 10px 12px; background: #16213e; border-radius: 8px; border: 1px solid #1a1a4e;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.red { background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: pulse 1.5s ease-in-out infinite; }
    .dot.gray { background: #666; }
    .dot.yellow { background: #eab308; box-shadow: 0 0 6px #eab308; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .status-text { font-size: 13px; flex: 1; }
    .status-text strong { display: block; font-size: 12px; }
    .status-text small { color: #888; font-size: 11px; }
    .btn {
      display: block; width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #ff0000; color: white; }
    .btn-primary:hover:not(:disabled) { background: #cc0000; }
    .btn-secondary { background: #16213e; color: #e0e0e0; border: 1px solid #1a1a4e; }
    .btn-secondary:hover:not(:disabled) { background: #1a1a4e; }
    .config-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #1a1a4e; }
    .config-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .config-row label { font-size: 11px; color: #888; min-width: 50px; }
    .config-row input {
      flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid #1a1a4e;
      background: #0f0f23; color: #e0e0e0; font-size: 12px; outline: none;
    }
    .config-row input:focus { border-color: #ff0000; }
    .auto-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: #333; border-radius: 10px; transition: 0.2s;
    }
    .toggle .slider:before {
      content: ''; position: absolute; width: 16px; height: 16px; left: 2px; bottom: 2px;
      background: white; border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #22c55e; }
    .toggle input:checked + .slider:before { transform: translateX(16px); }
    .result { padding: 8px; border-radius: 6px; font-size: 12px; margin-top: 4px; display: none; }
    .result.success { display: block; background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .result.error { display: block; background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .footer { text-align: center; font-size: 10px; color: #444; padding: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">📻</span>
    <h1>MBot Cookie Bridge</h1>
  </div>
  <div class="content">
    <div class="status-row">
      <div id="status-dot" class="dot gray"></div>
      <div class="status-text">
        <strong id="status-label">Checking...</strong>
        <small id="status-detail">Connecting to bot</small>
      </div>
    </div>

    <button id="send-btn" class="btn btn-primary" disabled>🍪 Send YouTube Cookies</button>
    <div id="result" class="result"></div>

    <button id="refresh-btn" class="btn btn-secondary">🔄 Check Status</button>

    <div class="config-section">
      <div class="config-row">
        <label>Bot URL</label>
        <input id="bot-url" type="text" placeholder="http://192.168.1.100:8080">
      </div>
      <div class="auto-row">
        <label class="toggle">
          <input id="auto-refresh" type="checkbox">
          <span class="slider"></span>
        </label>
        <span>Auto-refresh cookies every 6 hours</span>
      </div>
    </div>
  </div>
  <div class="footer">MBot Cookie Bridge v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
