# ──────────────────────────────────────────────────────────────────
# Shadow Controller — Configuration
# ──────────────────────────────────────────────────────────────────
# The silent operator behind the 420 Radio DJ.
# Copy this file to config.yaml and fill in your settings.
# ──────────────────────────────────────────────────────────────────

# ── DJ Bot Mission Control ────────────────────────────────────────
# The IP/hostname and port of the DJ bot's Mission Control web dashboard
bot_api_url: "http://192.168.1.50:8080"

# Your Discord server (guild) ID
guild_id: "YOUR_GUILD_ID"

# Optional: Mission Control login password (leave blank if no password set)
# NOTE: If HERMES_API_KEY is set (below), it takes priority over web_password
web_password: ""

# ── Hermes Agent API Key (PREFERRED) ──────────────────────────────
# Machine-to-machine authentication — no session/CSRF tokens needed.
# Generate on the DJ bot server:
#   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
# Then add the SAME key to the DJ bot's .env as HERMES_API_KEY=...
# When set, all API calls use /api/hermes/* endpoints with Bearer auth.
hermes_api_key: ""

# ── Ollama (running on this same VM) ─────────────────────────────
# Hermes Agent uses Ollama's OpenAI-compatible endpoint for reasoning
ollama_url: "http://localhost:11434"
ollama_model: "hermes3:8b"

# ── Music Discovery Genres ────────────────────────────────────────
# What kind of music should the agent search for?
genres:
  - "lo-fi"
  - "rap"
  - "electro_swing"
  - "edm"
  - "chill_beats"
  - "reggae"

# Minimum songs in a playlist to consider it worth queuing
min_playlist_songs: 30

# ── Loop Intervals (seconds) ──────────────────────────────────────
# How often each loop checks its domain

# Cookie health: check if YouTube cookies are stale or auth is blocked
cookie_check_interval: 300        # 5 minutes

# Queue depth: make sure there are always songs to play
queue_check_interval: 60          # 1 minute

# Stream health: monitor YouTube Live + OBS connection
stream_check_interval: 30         # 30 seconds

# Playlist discovery: find new playlists on YouTube
playlist_discovery_interval: 1800 # 30 minutes

# ── Cookie Health Thresholds ───────────────────────────────────────
# How old (days) before cookies are considered stale and need refresh
cookie_max_age_days: 5

# ── Queue Thresholds ───────────────────────────────────────────────
# Minimum songs in queue before the watchdog takes action
queue_min_songs: 3

# ── Stream Recovery ────────────────────────────────────────────────
# Should the YouTube Live stream always be running?
stream_should_be_live: true

# Max automatic restart attempts before giving up and alerting
stream_restart_max_attempts: 3

# Cooldown between restart attempts (seconds)
stream_restart_cooldown: 120

# ── Alerts ─────────────────────────────────────────────────────────
# Discord webhook URL for instant notifications
# Create one at: Server Settings → Integrations → Webhooks → New Webhook
discord_webhook_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"

# Also log alerts to Mission Control's activity log
alert_to_mission_control: true

# Don't send the same alert type more than once within this window (seconds)
alert_cooldown_seconds: 30

# ── Discord Fan Request Watcher (DISABLED BY DEFAULT) ─────────────
# A lightweight Discord bot that watches a channel for YouTube links
# Needs its own Discord bot token (Message Content Intent required)
# NOTE: You need a SEPARATE Discord bot token for this — the DJ bot's
# token won't work. Create one only if you want fan requests.

# Set to false — no fan request watching unless you set up a watcher bot
fan_request_enabled: false

# Discord bot token for the watcher (leave blank if disabled)
# Create at: https://discord.com/developers/applications → New App → Bot
# Enable: Message Content Intent + Server Members Intent
discord_watcher_token: ""

# Channel ID to watch for fan-posted YouTube links (leave blank if disabled)
fan_request_channel_id: ""

# ── Suno Creator (Loop 6) ──────────────────────────────────────────
# Hermes browses Suno.com on your account and creates original music
# The DJ bot already supports Suno URLs — tracks go straight into the queue

# Enable Suno music creation (default: true)
suno_enabled: true

# How often to create a new track on Suno (seconds, default: 1 hour)
suno_creation_interval: 3600

# Max tracks waiting for generation before pausing creation
suno_max_pending: 3

# Auto-queue finished Suno tracks into the DJ bot
suno_auto_queue: true

# ── Browser (Firefox) ──────────────────────────────────────────────
# Path to the Firefox profile with YouTube logged in + cookie.txt plugin
# Leave blank to auto-detect the default profile
firefox_profile_path: ""

# Path where the cookie.txt Firefox plugin exports to
# Common: ~/Downloads/cookies.txt
# Leave blank to auto-detect
cookie_txt_path: ""

# YouTube Live stream URL to keep in a browser tab for monitoring
youtube_live_url: "https://www.youtube.com/channel/YOUR_CHANNEL/live"

# Run browser in headless mode (no GUI window)
# Set to true if running without a desktop environment
# Set to false (default) to use the VM's existing Firefox GUI
headless: false

# ── Logging ────────────────────────────────────────────────────────
# Log level: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"