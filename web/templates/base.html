<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mission Control{% endblock %} — MBot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h1><span class="icon">🎵</span> MBot</h1>
                <div class="subtitle">Mission Control</div>
            </div>
            <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <span class="icon">📊</span> Dashboard
            </a>
            <a href="{{ url_for('dj_lines') }}" class="nav-item {% if request.endpoint == 'dj_lines' %}active{% endif %}">
                <span class="icon">🎙️</span> DJ Lines
            </a>
        </nav>
        <main class="main">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <ul class="flashes">
                {% for category, message in messages %}
                <li class="flash-{{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
            {% endwith %}
            {% block content %}{% endblock %}
        </main>
    </div>
    <meta id="refresh" http-equiv="refresh" content="30">
</body>
</html>
