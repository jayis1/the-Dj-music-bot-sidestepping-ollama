<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — {{ bot_name }} Mission Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-card h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .login-card .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 28px;
        }
        .login-card label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .login-card input[type="password"] {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-card input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .login-card .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            background: var(--accent);
            color: white;
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s;
        }
        .login-card .btn-login:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        .login-card .flashes {
            list-style: none;
            margin-bottom: 16px;
            padding: 0;
        }
        .login-card .flashes li {
            padding: 10px 14px;
            border-radius: var(--radius);
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
        }
        .flash-success { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid var(--success); }
        .flash-error   { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }

        /* Padlock icon */
        .lock-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="lock-icon">🔒</div>
            <h1><span class="icon">🎵</span> {{ bot_name }}</h1>
            <div class="subtitle">Mission Control</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <ul class="flashes">
                {% for category, message in messages %}
                <li class="flash-{{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter mission control password" autofocus autocomplete="current-password">
                <button type="submit" class="btn-login">Unlock</button>
            </form>
        </div>
    </div>
</body>
</html>
