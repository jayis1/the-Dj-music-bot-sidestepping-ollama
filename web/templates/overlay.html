<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBS Overlay — {{ bot_name }}</title>
<style>
/* ── Master HUD Mirror ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    /* Set native FFmpeg resolution matching Utils/Youtube_stream.py */
    width: 1280px;
    height: 720px;
    background: transparent;
    font-family: 'DejaVu Sans', 'Segoe UI', 'Inter', -apple-system, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

/* ── FFmpeg Native Coordinate Mapping ── */
.hud-station {
    position: absolute;
    left: 450px;
    top: 150px;
    font-size: 42px;
    font-weight: bold;
    color: white;
}

.hud-title {
    position: absolute;
    left: 450px;
    top: 210px;
    font-size: 56px;
    font-weight: bold;
    color: gold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 800px; /* Prevent run-off */
}

/* ── DJ Indicator Mapping ── */
.hud-dj {
    position: absolute;
    left: 450px;
    top: 280px;
    font-size: 36px;
    font-weight: normal;
    color: #00FFCC;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.3s ease;
}
.hud-dj.visible {
    opacity: 1;
}

/* ── SFX Overlay Animation ── */
.sfx-anim {
    position: absolute;
    right: 50px;
    top: 50px;
    width: 250px;
    height: auto;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
}
.sfx-anim.visible {
    opacity: 1;
    transform: scale(1);
}

/* ── Bottom Ticker Mapping ── */
.hud-ticker-bg {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 1280px;
    height: 40px;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
}
.hud-ticker-text {
    font-size: 24px;
    font-weight: normal;
    color: white;
    text-shadow: none; /* FFmpeg didn't specify shadow here natively */
}

/* ── Album Art (Optional aesthetic carryover from old overlay) ── */
.art-container {
    position: absolute;
    left: 40px;
    top: 150px; /* Align to Station title block */
    width: 380px;
    height: 380px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.3);
}
.art {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.art-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 120px;
    background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(59,130,246,0.3));
}

</style>
</head>
<body>

    <!-- Native HUD Elements -->
    <div class="hud-station" id="station">LOADING</div>
    <div class="hud-title" id="title">Waiting for playback…</div>
    
    <div class="hud-dj" id="speakingLabel">🎙️ DJ SPEAKING...</div>

    <!-- Sound Effect Animation -->
    <img id="sfxAnim" class="sfx-anim" src="/assets/giphy.gif" alt="SFX Playing!">

    <!-- Ticker Box -->
    <div class="hud-ticker-bg">
        <div class="hud-ticker-text" id="tickerText">Initializing Stream Protocol...</div>
    </div>

    <!-- Album Art -->
    <div class="art-container">
        <img class="art" id="art" src="" alt="" style="display:none;">
        <div class="art-placeholder" id="artPlaceholder">🎵</div>
    </div>
    
    <!-- Intro Sequence Video -->
    <video id="introVideo" style="display: none; position: absolute; z-index: 9999; top: 0; left: 0; width: 1280px; height: 720px; object-fit: cover;" autoplay loop muted>
        <source src="/assets/intro.mp4" type="video/mp4">
    </video>

<script>
// ── State ──
let prevState = { playing: false, title: null, dj_speaking: false, ai_speaking: false, booting: false };
let pollInterval = 1000;

// ── Elements ──
const station = document.getElementById('station');
const title = document.getElementById('title');
const speakingLabel = document.getElementById('speakingLabel');
const sfxAnim = document.getElementById('sfxAnim');
const tickerText = document.getElementById('tickerText');
const art = document.getElementById('art');
const artPlaceholder = document.getElementById('artPlaceholder');
const introVideo = document.getElementById('introVideo');

// ── Format time ──
function fmt(sec) {
    if (!sec || sec <= 0) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

// ── Update loop ──
async function pollState() {
    try {
        const res = await fetch('/api/overlay');
        const data = await res.json();
        updateOverlay(data);
    } catch (e) {
        // Silently retry
    }
    setTimeout(pollState, pollInterval);
}

function updateOverlay(data) {
    // Top Titles
    station.textContent = data.station_name || 'MBOT RADIO';
    title.textContent = data.title || 'Waiting for playback…';

    if (data.paused) {
        title.innerHTML = `${data.title || 'Waiting'} <span style="font-size: 32px; color: #ff5555; vertical-align: middle;">[PAUSED]</span>`;
    }
    
    // Boot Sequence Logic
    if (data.booting) {
        if (!prevState.booting) {
            introVideo.style.display = 'block';
            introVideo.play();
        }
        tickerText.textContent = "⚙️ Booting Auto-DJ Mainframes... Generating opening sequence (Waiting for 25 tracks)";
    } else {
        if (prevState.booting) {
            introVideo.style.display = 'none';
            introVideo.pause();
        }
        // Normal Ticker Text Logic
        let elapsed = fmt(data.elapsed);
        let duration = fmt(data.duration);
        
        if (data.playing && data.title) {
            tickerText.textContent = `▶ NOW PLAYING: ${data.title}  |  ${elapsed} / ${duration}`;
        } else {
            tickerText.textContent = "Radio sequence initialized — waiting in standby...";
        }
    }

    // Speaking Hook Indicator
    const isSpeaking = data.dj_speaking || data.ai_speaking;
    if (isSpeaking) {
        speakingLabel.classList.add('visible');
        if (data.ai_speaking) {
            speakingLabel.textContent = '🃏 AI SIDE HOST SPEAKING...';
            speakingLabel.style.color = '#a855f7';
        } else {
            speakingLabel.textContent = '🎙️ DJ SPEAKING...';
            speakingLabel.style.color = '#00FFCC';
        }
    } else {
        speakingLabel.classList.remove('visible');
    }

    // SFX Animation Hook
    if (data.sfx_active) {
        sfxAnim.classList.add('visible');
    } else {
        sfxAnim.classList.remove('visible');
    }

    // Album Art Bridge
    if (data.thumbnail && data.thumbnail !== prevState.thumbnail) {
        art.src = data.thumbnail;
        art.style.display = 'block';
        artPlaceholder.style.display = 'none';
    } else if (!data.thumbnail) {
        art.style.display = 'none';
        artPlaceholder.style.display = 'flex';
    }

    prevState = data;
}

// Boot Pulse
pollState();
</script>
</body>
</html>
